name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.12"

      - name: Python
        run: uv python install 3.12

      - name: Lua 5.4 (golden tests for docker/safe_run.lua)
        run: sudo apt-get update && sudo apt-get install -y lua5.4

      - name: Sync, lint, test
        run: |
          uv sync --all-extras
          uv run ruff check .
          uv run pytest -q

  docker-compose-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Compose build (API image)
        run: docker compose build api
