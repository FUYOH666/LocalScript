# Full stack for hackathon review: Ollama + LocalScript API (ollama-8gb profile env).
#
# First time (pull model once, then start API):
#   docker compose up -d ollama
#   docker compose exec ollama ollama pull qwen2.5-coder:7b
#   docker compose up -d
#
# One-shot after model is present:
#   docker compose up --build
#
# Health: http://127.0.0.1:8765/healthz — LLM shows ok only after the model pull finishes.

name: localscript

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL: "1"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8765:8765"
    environment:
      LOCALSCRIPT_API_HOST: "0.0.0.0"
      LOCALSCRIPT_LLM_BASE_URL: "http://ollama:11434/v1"
      LOCALSCRIPT_LLM_MODEL: "qwen2.5-coder:7b"
      LOCALSCRIPT_LLM_MAX_TOKENS: "256"
      LOCALSCRIPT_LLM_EXTRA_BODY_JSON: '{"options":{"num_ctx":4096,"num_batch":1}}'
      LOCALSCRIPT_GENERATE_CANDIDATES_N: "1"
      LOCALSCRIPT_GENERATE_CANDIDATES_MAX_PARALLEL: "1"
      LOCALSCRIPT_RAG_ENABLED: "false"
      LOCALSCRIPT_QUALITY_POLICY_ENABLED: "false"
      LOCALSCRIPT_QUALITY_JUDGE_ENABLED: "false"
      LOCALSCRIPT_ENABLE_STYLUA: "false"
      LOCALSCRIPT_ENABLE_SELENE: "false"
      LOCALSCRIPT_ENABLE_LUALS: "false"
      LOCALSCRIPT_LUAC_COMMAND: "luac5.4"
    depends_on:
      - ollama

volumes:
  ollama_data:
